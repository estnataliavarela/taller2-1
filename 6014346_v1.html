<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Triángulos - DDA & Bresenham</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; padding: 20px; }
        canvas { background: white; border: 1px solid #ccc; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .controls { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .input-group { margin-bottom: 10px; }
        input { width: 50px; margin-right: 10px; padding: 3px; }
        #mensaje { font-weight: bold; margin-top: 15px; min-height: 20px; }
        .botones { margin-top: 10px; display: flex; gap: 10px; }
        button { cursor: pointer; padding: 5px 15px; border-radius: 4px; border: 1px solid #bbb; }
    </style>
</head>
<body>

    <h2>Calculadora de Triángulos y Trazado de Líneas</h2>

    <div class="controls">
        <div class="input-group">
            Punto 1: X1 <input type="number" id="x1" value="100"> Y1 <input type="number" id="y1" value="100">
        </div>
        <div class="input-group">
            Punto 2: X2 <input type="number" id="x2" value="400"> Y2 <input type="number" id="y2" value="100">
        </div>
        <div class="input-group">
            Punto 3: X3 <input type="number" id="x3" value="250"> Y3 <input type="number" id="y3" value="300">
        </div>
        <div class="input-group">
            Grosor: <input type="number" id="grosor" value="3" min="1">
            Algoritmo: 
            <select id="metodo">
                <option value="DDA">DDA</option>
                <option value="Bresenham">Bresenham</option>
            </select>
        </div>
        <div class="botones">
            <button onclick="procesar()" style="background: #e0e0e0;">Dibujar y Verificar</button>
            <button onclick="limpiar()" style="background: #ffcccc;">Eliminar y empezar de nuevo</button>
        </div>
        <div id="mensaje"></div>
    </div>

    <canvas id="miCanvas" width="550" height="450"></canvas>

    <script
        src="6014346_v1.js"></script>
    </script>
</body>
</html>
